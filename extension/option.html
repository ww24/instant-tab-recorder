<!doctype html>

<head>
    <meta charset="utf-8">
    <title>Options</title>
    <link href="material-symbols-outlined.css" rel="stylesheet">
    <style>
        :root {
            --md-ref-typeface-brand: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --md-ref-typeface-plain: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            margin-top: 0;
        }

        .container {
            width: 640px;
            position: relative;
            margin: auto;
        }

        /* Themed heading colors for Light & Dark */
        html[data-theme="light"] h2,
        html[data-theme="light"] h3 {
            color: var(--theme-text);
        }

        html[data-theme="dark"] h2,
        html[data-theme="dark"] h3 {
            color: var(--theme-text);
        }
    </style>
</head>

<body>
    <script type="module" src="dist/option.js"></script>
    <div class="container">
        <option-tab>
            <div slot="panel-main">
                <record-list id="records"></record-list>
            </div>
            <div slot="panel-settings">
                <extension-settings></extension-settings>
            </div>
            <div slot="panel-cropping">
                <extension-cropping></extension-cropping>
            </div>
            <div slot="panel-support">
                <extension-support></extension-support>
            </div>
        </option-tab>
        <extension-confirm id="confirm-dialog"></extension-confirm>
        <extension-alert id="alert-dialog"></extension-alert>
        <extension-timer-stop-confirm></extension-timer-stop-confirm>
    </div>
</body>
